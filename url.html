<script>
async function detectURL() {
    const url = document.getElementById("url").value;

    const res = await fetch("http://127.0.0.1:5000/detect", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: "",
            url: url
        })
    });

    const data = await res.json();
    alert(data.result);
}
</script>
